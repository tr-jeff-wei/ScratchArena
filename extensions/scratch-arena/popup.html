<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Scratch VM Monitor</title>

<style>
body{
    width:350px;
    margin:0;
    padding:10px;
    font-family:Arial, Helvetica, sans-serif;
    background:#f5f5f5;
}

h2{
    margin:0 0 10px 0;
    color:#ff8c00;
}

button{
    width:100%;
    padding:8px;
    margin-bottom:10px;
    font-size:14px;
    cursor:pointer;
}

#status{
    color:#666;
    margin-bottom:10px;
}

.sprite{
    background:white;
    border-radius:6px;
    padding:8px;
    margin-bottom:8px;
    border:1px solid #ddd;
}

.sprite-title{
    font-weight:bold;
    color:#007acc;
    margin-bottom:5px;
}

.variable{
    margin-left:10px;
    font-size:13px;
}

pre{
    white-space:pre-wrap;
    word-break:break-word;
}
</style>

</head>

<body>

<h2>Scratch VM Monitor</h2>

<button id="refresh">
重新整理
</button>

<div id="status">
等待取得 Scratch VM...
</div>

<div id="sprites"></div>

<script src="popup.js"></script>

</body>
</html>
